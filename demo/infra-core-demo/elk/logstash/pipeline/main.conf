# Logstash 파이프라인 설정
# 입력: Filebeat (Beats 프로토콜) → 파싱 → Elasticsearch 출력

input {
  # Filebeat/Beats 에이전트로부터 수신
  beats {
    port => 5044
  }

  # TCP 직접 입력 (테스트/로컬 앱용)
  tcp {
    port => 5000
    codec => json_lines
  }
}

filter {
  # ──────────────────────────────────────────
  # JSON 구조화 로그 파싱
  # 앱이 JSON 형식으로 로그를 출력하는 경우
  # ──────────────────────────────────────────
  if [message] =~ /^\{/ {
    json {
      source => "message"
      target => "parsed"
    }

    # 파싱된 필드를 루트 레벨로 승격
    mutate {
      rename => {
        "[parsed][level]"       => "log_level"
        "[parsed][message]"     => "log_message"
        "[parsed][service]"     => "service_name"
        "[parsed][trace_id]"    => "trace_id"
        "[parsed][duration_ms]" => "duration_ms"
        "[parsed][status_code]" => "http_status_code"
        "[parsed][path]"        => "request_path"
        "[parsed][method]"      => "http_method"
        "[parsed][cb_state]"    => "circuit_breaker_state"
        "[parsed][error]"       => "error_message"
      }
      remove_field => ["parsed", "message"]
    }
  }

  # ──────────────────────────────────────────
  # Grok 패턴: 비구조화 로그 파싱 (레거시 앱)
  # ──────────────────────────────────────────
  else {
    grok {
      match => {
        "message" => [
          # Spring Boot 스타일: 2024-01-15 10:30:45.123 ERROR [service-name] ...
          "%{TIMESTAMP_ISO8601:timestamp} %{LOGLEVEL:log_level} \[%{DATA:service_name}\] %{GREEDYDATA:log_message}",
          # 일반 Nginx 액세스 로그 패턴
          "%{IPORHOST:client_ip} - - \[%{HTTPDATE:timestamp}\] \"%{WORD:http_method} %{URIPATHPARAM:request_path} HTTP/%{NUMBER:http_version}\" %{NUMBER:http_status_code} %{NUMBER:bytes_sent}"
        ]
      }
      # Grok 실패 시 태그 추가 (추후 분석 가능)
      tag_on_failure => ["_grok_parse_failure"]
    }
  }

  # ──────────────────────────────────────────
  # 공통 필드 처리
  # ──────────────────────────────────────────
  mutate {
    # log_level 소문자 정규화
    lowercase => ["log_level"]

    # 불필요 필드 제거
    remove_field => ["agent", "ecs", "input", "log", "tags"]
  }

  # 타임스탬프 파싱 (ISO8601 형식)
  if [timestamp] {
    date {
      match => ["timestamp", "ISO8601", "dd/MMM/yyyy:HH:mm:ss Z"]
      target => "@timestamp"
      remove_field => ["timestamp"]
    }
  }

  # Circuit Breaker 상태 변화 감지 (BFF 모니터링 핵심)
  if [circuit_breaker_state] in ["open", "half-open"] {
    mutate {
      add_tag => ["circuit_breaker_alert"]
      add_field => { "alert_severity" => "warning" }
    }
  }

  # HTTP 5xx 에러 태그
  if [http_status_code] and [http_status_code] >= 500 {
    mutate {
      add_tag => ["http_error_5xx"]
      add_field => { "alert_severity" => "error" }
    }
  }

  # 느린 응답 감지 (1초 이상)
  if [duration_ms] and [duration_ms] >= 1000 {
    mutate {
      add_tag => ["slow_response"]
      add_field => { "performance_issue" => "true" }
    }
  }
}

output {
  # ──────────────────────────────────────────
  # Elasticsearch 출력
  # 인덱스 패턴: 서비스명-YYYY.MM.DD (ILM으로 관리 권장)
  # ──────────────────────────────────────────
  elasticsearch {
    hosts => ["http://elasticsearch:9200"]
    user => "elastic"
    password => "${ELASTIC_PASSWORD}"

    # 동적 인덱스 이름: 서비스별 분리
    index => "%{[service_name]:app-logs}-%{+YYYY.MM.dd}"

    # ILM(Index Lifecycle Management) 정책 연결
    ilm_enabled    => true
    ilm_rollover_alias => "app-logs"
    ilm_pattern    => "{now/d}-000001"
    ilm_policy     => "infra-core-logs-policy"
  }

  # ──────────────────────────────────────────
  # 디버그: 표준 출력 (개발환경에서 활성화)
  # ──────────────────────────────────────────
  # stdout {
  #   codec => rubydebug
  # }
}
