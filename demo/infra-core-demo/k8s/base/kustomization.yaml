---
# Kustomize 기반 설정
# 목적: overlays/dev 및 overlays/prod에서 환경별 패치 적용

apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: infra-core

resources:
  - namespace.yaml
  - apps/bff/deployment.yaml
  - apps/kafka-consumer/deployment.yaml
  - apps/filebeat/daemonset.yaml

commonLabels:
  project: infra-core
  managed-by: kustomize
