---
# overlays/dev: Dev 환경 패치
# base 리소스를 기반으로 Dev 전용 설정 오버라이드

apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

bases:
  - ../../base

namespace: infra-core-dev

namePrefix: dev-

# Dev 환경 공통 라벨
commonLabels:
  environment: dev

# 이미지 태그 오버라이드 (dev 브랜치 이미지)
images:
  - name: ACCOUNT_ID.dkr.ecr.ap-northeast-2.amazonaws.com/infra-core/bff
    newTag: dev-latest
  - name: ACCOUNT_ID.dkr.ecr.ap-northeast-2.amazonaws.com/infra-core/kafka-consumer
    newTag: dev-latest

# BFF 레플리카 수 축소 (Dev 비용 절감)
patches:
  - target:
      kind: Deployment
      name: bff
    patch: |-
      - op: replace
        path: /spec/replicas
        value: 1
  - target:
      kind: Deployment
      name: kafka-consumer
    patch: |-
      - op: replace
        path: /spec/replicas
        value: 1
  # Dev: HPA 비활성화 (레플리카 고정)
  - target:
      kind: HorizontalPodAutoscaler
      name: bff-hpa
    patch: |-
      - op: replace
        path: /spec/minReplicas
        value: 1
      - op: replace
        path: /spec/maxReplicas
        value: 2
